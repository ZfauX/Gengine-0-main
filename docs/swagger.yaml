basePath: /
host: localhost:8080
info:
  contact:
    email: support@gengine.io
    name: API Support
  description: API для платформы квестов Gengine
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Gengine API
  version: "1.0"
paths:
  /achievements:
    get:
      description: Отображает все достижения текущего пользователя
      produces:
      - text/html
      responses:
        "200":
          description: Страница достижений
          schema:
            type: string
      security:
      - JWT: []
      summary: Список достижений
      tags:
      - achievements
  /admin:
    get:
      description: Отображает главную страницу админ-панели с общей статистикой
      produces:
      - text/html
      responses:
        "200":
          description: Страница админ-панели
          schema:
            type: string
      security:
      - JWT: []
      summary: Панель управления администратора
      tags:
      - admin
  /admin/audit:
    get:
      description: Отображает записи аудита с возможностью фильтрации по пользователю
        и действию
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        name: page
        type: integer
      - default: 20
        description: Количество записей на странице
        in: query
        name: per_page
        type: integer
      - description: ID пользователя
        in: query
        name: user_id
        type: string
      - description: Действие (create, update, delete, login и т.д.)
        in: query
        name: action
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Страница аудита
          schema:
            type: string
      security:
      - JWT: []
      summary: Журнал аудита
      tags:
      - admin
  /admin/backups:
    get:
      description: Отображает список созданных резервных копий базы данных
      produces:
      - text/html
      responses:
        "200":
          description: Страница бекапов
          schema:
            type: string
      security:
      - JWT: []
      summary: Список бекапов
      tags:
      - admin
  /admin/backups/{id}/download:
    get:
      description: Скачивает файл резервной копии по ID
      parameters:
      - description: ID бекапа
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/octet-stream
      responses:
        "200":
          description: Файл бекапа
          schema:
            type: file
        "404":
          description: Бекап не найден
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Скачать бекап
      tags:
      - admin
  /admin/backups/create:
    post:
      description: Создаёт новую резервную копию базы данных с помощью pg_dump
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /admin/backups
          schema:
            type: string
      security:
      - JWT: []
      summary: Создание бекапа
      tags:
      - admin
  /admin/backups/rotate:
    post:
      description: Удаляет старые резервные копии, оставляя не более MaxBackups
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /admin/backups
          schema:
            type: string
      security:
      - JWT: []
      summary: Ротация бекапов
      tags:
      - admin
  /admin/games:
    get:
      description: Отображает все игры с фильтром по статусу (черновик / опубликована)
      parameters:
      - description: Статус игры (draft, published)
        in: query
        name: status
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Страница со списком игр
          schema:
            type: string
      security:
      - JWT: []
      summary: Список игр (административный)
      tags:
      - admin
  /admin/games/{id}/delete:
    get:
      description: Безвозвратно удаляет игру (доступно только администратору)
      parameters:
      - description: ID игры
        in: path
        name: id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /admin/games
          schema:
            type: string
      security:
      - JWT: []
      summary: Удаление игры (административное)
      tags:
      - admin
  /admin/users:
    get:
      description: Отображает список всех пользователей с фильтром по роли
      parameters:
      - description: Роль пользователя (user, admin)
        in: query
        name: role
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Страница со списком пользователей
          schema:
            type: string
      security:
      - JWT: []
      summary: Список пользователей
      tags:
      - admin
  /admin/users/{id}/delete:
    get:
      description: Безвозвратно удаляет пользователя (административное действие)
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /admin/users
          schema:
            type: string
      security:
      - JWT: []
      summary: Удаление пользователя
      tags:
      - admin
  /admin/users/{id}/toggle-admin:
    get:
      description: Делает пользователя администратором или обычным пользователем
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /admin/users
          schema:
            type: string
      security:
      - JWT: []
      summary: Переключение роли пользователя
      tags:
      - admin
  /api/v1/calendar:
    get:
      description: Возвращает список игр за указанный месяц в формате JSON
      parameters:
      - description: Год
        in: query
        name: year
        type: integer
      - description: Месяц (1-12)
        in: query
        name: month
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: События календаря
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Внутренняя ошибка
          schema:
            additionalProperties: true
            type: object
      summary: Данные календаря
      tags:
      - calendar
  /auth/forgot:
    get:
      consumes:
      - text/html
      description: Возвращает HTML-страницу для запроса сброса пароля
      produces:
      - text/html
      responses:
        "200":
          description: Страница восстановления
          schema:
            type: string
      summary: Показать форму восстановления пароля
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Отправляет на email ссылку для установки нового пароля
      parameters:
      - description: Email пользователя
        in: formData
        name: email
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Инструкция отправлена
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Некорректный email
          schema:
            additionalProperties: true
            type: object
      summary: Запрос на сброс пароля
      tags:
      - auth
  /auth/login:
    get:
      consumes:
      - text/html
      description: Возвращает HTML-страницу с формой входа
      produces:
      - text/html
      responses:
        "200":
          description: Страница входа
          schema:
            type: string
      summary: Показать форму входа
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Вход в систему с получением JWT-токена (устанавливается в cookie)
      parameters:
      - description: Email пользователя
        in: formData
        name: email
        required: true
        type: string
      - description: Пароль
        in: formData
        name: password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /dashboard
          schema:
            type: string
        "400":
          description: Ошибка валидации
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Неверный email или пароль
          schema:
            additionalProperties: true
            type: object
      summary: Аутентификация пользователя
      tags:
      - auth
  /auth/logout:
    get:
      description: Удаляет JWT-куку и перенаправляет на главную
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /
          schema:
            type: string
      summary: Выход из системы
      tags:
      - auth
  /auth/oauth/{provider}:
    get:
      description: Перенаправляет на страницу авторизации провайдера (Google, GitHub,
        Yandex)
      parameters:
      - description: Провайдер OAuth (google, github, yandex)
        in: path
        name: provider
        required: true
        type: string
      responses:
        "302":
          description: Перенаправление на провайдера
          schema:
            type: string
        "400":
          description: Неподдерживаемый провайдер
          schema:
            additionalProperties: true
            type: object
      summary: Начало OAuth-авторизации
      tags:
      - auth
  /auth/oauth/{provider}/callback:
    get:
      description: Завершает OAuth-авторизацию, создаёт/входит пользователя
      parameters:
      - description: Провайдер OAuth
        in: path
        name: provider
        required: true
        type: string
      - description: Код авторизации
        in: query
        name: code
        required: true
        type: string
      - description: Состояние (state)
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Перенаправление на /dashboard
          schema:
            type: string
        "400":
          description: Ошибка авторизации
          schema:
            additionalProperties: true
            type: object
      summary: Обработка callback OAuth
      tags:
      - auth
  /auth/register:
    get:
      consumes:
      - text/html
      description: Возвращает HTML-страницу с формой регистрации
      produces:
      - text/html
      responses:
        "200":
          description: Страница регистрации
          schema:
            type: string
      summary: Показать форму регистрации
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Создаёт нового пользователя, отправляет письмо подтверждения и
        авторизует
      parameters:
      - description: Email пользователя
        in: formData
        name: email
        required: true
        type: string
      - description: Пароль (минимум 8 символов)
        in: formData
        name: password
        required: true
        type: string
      - description: Имя пользователя
        in: formData
        name: name
        required: true
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /auth/login
          schema:
            type: string
        "400":
          description: Ошибка валидации
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Email уже зарегистрирован
          schema:
            additionalProperties: true
            type: object
      summary: Регистрация пользователя
      tags:
      - auth
  /auth/reset:
    get:
      consumes:
      - text/html
      description: Возвращает HTML-страницу для ввода нового пароля по токену
      parameters:
      - description: Токен сброса пароля
        in: query
        name: token
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Страница сброса пароля
          schema:
            type: string
      summary: Показать форму сброса пароля
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Устанавливает новый пароль по токену, полученному по email
      parameters:
      - description: Токен сброса пароля
        in: formData
        name: token
        required: true
        type: string
      - description: Новый пароль (минимум 8 символов)
        in: formData
        name: password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /auth/login
          schema:
            type: string
        "400":
          description: Ошибка валидации или неверный токен
          schema:
            additionalProperties: true
            type: object
      summary: Сброс пароля
      tags:
      - auth
  /auth/verify:
    get:
      consumes:
      - application/json
      description: Активирует email пользователя по токену
      parameters:
      - description: Токен подтверждения
        in: query
        name: token
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Email подтверждён
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный или истёкший токен
          schema:
            additionalProperties: true
            type: object
      summary: Подтверждение email
      tags:
      - auth
  /calendar:
    get:
      description: Возвращает HTML-страницу с календарём игр
      produces:
      - text/html
      responses:
        "200":
          description: Страница календаря
          schema:
            type: string
      summary: Страница календаря
      tags:
      - calendar
  /chat/ws:
    get:
      description: Устанавливает WebSocket-соединение для обмена сообщениями в чате
      parameters:
      - description: ID комнаты чата
        in: query
        name: room
        required: true
        type: string
      responses:
        "101":
          description: Switching Protocols
          schema:
            type: string
      security:
      - JWT: []
      summary: WebSocket чата
      tags:
      - monitor
  /dashboard:
    get:
      description: Отображает дашборд текущего пользователя
      produces:
      - text/html
      responses:
        "200":
          description: Страница дашборда
          schema:
            type: string
        "500":
          description: Внутренняя ошибка
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Личный кабинет
      tags:
      - dashboard
  /follow/{id}:
    delete:
      consumes:
      - application/json
      description: Удаляет подписку текущего пользователя на автора
      parameters:
      - description: ID автора
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Статус unfollowed
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный ID автора
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Отписаться от автора
      tags:
      - social
    post:
      consumes:
      - application/json
      description: Создаёт подписку текущего пользователя на автора игр
      parameters:
      - description: ID автора
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Статус followed
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный ID автора
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Подписаться на автора
      tags:
      - social
  /follow/{id}/check:
    get:
      description: Проверяет, подписан ли текущий пользователь на автора
      parameters:
      - description: ID автора
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Статус подписки
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный ID автора
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Проверить подписку
      tags:
      - social
  /game/{passing_id}:
    get:
      description: Отображает страницу прохождения текущего уровня для команды
      parameters:
      - description: ID прохождения
        in: path
        name: passing_id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "200":
          description: Страница прохождения уровня
          schema:
            type: string
      security:
      - JWT: []
      summary: Страница прохождения уровня
      tags:
      - gameplay
  /game/{passing_id}/accept:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Автор принимает ответ команды (для Blackbox-уровня)
      parameters:
      - description: ID прохождения
        in: path
        name: passing_id
        required: true
        type: integer
      - description: ID игры
        in: query
        name: game_id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /games/{game_id}/monitor
          schema:
            type: string
      security:
      - JWT: []
      summary: Принятие ответа автором
      tags:
      - gameplay
  /game/{passing_id}/file:
    post:
      consumes:
      - multipart/form-data
      description: Отправляет файл в качестве ответа на текущем уровне
      parameters:
      - description: ID прохождения
        in: path
        name: passing_id
        required: true
        type: integer
      - description: Файл (jpeg, png, gif, pdf, txt)
        in: formData
        name: answer_file
        required: true
        type: file
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /game/{passing_id}
          schema:
            type: string
      security:
      - JWT: []
      summary: Отправка файлового ответа
      tags:
      - gameplay
  /game/{passing_id}/hint:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Использует подсказку для текущего уровня
      parameters:
      - description: ID прохождения
        in: path
        name: passing_id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /game/{passing_id}
          schema:
            type: string
      security:
      - JWT: []
      summary: Использование подсказки
      tags:
      - gameplay
  /game/{passing_id}/submit:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Отправляет текстовый код для проверки на текущем уровне
      parameters:
      - description: ID прохождения
        in: path
        name: passing_id
        required: true
        type: integer
      - description: Код
        in: formData
        name: code
        required: true
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /game/{passing_id}
          schema:
            type: string
      security:
      - JWT: []
      summary: Отправка кода
      tags:
      - gameplay
  /games:
    get:
      description: Возвращает список игр с фильтрацией и пагинацией
      parameters:
      - description: Статус игры (draft, published)
        in: query
        name: status
        type: string
      - description: Поиск по названию
        in: query
        name: search
        type: string
      - description: Поле сортировки (created_at, name, starts_at, rating, participants)
        in: query
        name: sort
        type: string
      - description: Порядок сортировки (asc, desc)
        in: query
        name: order
        type: string
      - default: 1
        description: Номер страницы
        in: query
        name: page
        type: integer
      - default: 20
        description: Количество на странице
        in: query
        name: per_page
        type: integer
      - description: ID автора
        in: query
        name: author_id
        type: integer
      produces:
      - text/html
      responses:
        "200":
          description: Страница со списком игр
          schema:
            type: string
      summary: Список игр
      tags:
      - games
    post:
      consumes:
      - multipart/form-data
      description: Создаёт новую игру как черновик
      parameters:
      - description: Название игры
        in: formData
        name: name
        required: true
        type: string
      - description: Описание игры
        in: formData
        name: description
        type: string
      - description: Обложка игры (jpeg, png, webp)
        in: formData
        name: cover
        type: file
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /games
          schema:
            type: string
        "400":
          description: Ошибка валидации
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Создание игры
      tags:
      - games
  /games/{game_id}/levels:
    get:
      description: Возвращает HTML-страницу со списком всех уровней игры
      parameters:
      - description: ID игры
        in: path
        name: game_id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "200":
          description: Страница со списком уровней
          schema:
            type: string
        "403":
          description: Нет прав доступа
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Список уровней игры
      tags:
      - levels
    post:
      consumes:
      - application/x-www-form-urlencoded
