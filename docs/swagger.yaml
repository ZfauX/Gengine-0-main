basePath: /
host: localhost:8080
info:
  contact:
    email: support@gengine.io
    name: API Support
  description: API для платформы квестов Gengine
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  termsOfService: http://swagger.io/terms/
  title: Gengine API
  version: "1.0"
paths:
  /achievements:
    get:
      description: Отображает все достижения текущего пользователя
      produces:
      - text/html
      responses:
        "200":
          description: Страница достижений
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Список достижений
      tags:
      - achievements
  /admin:
    get:
      description: Отображает главную страницу админ-панели с общей статистикой (пользователи,
        игры, аудит, бэкапы)
      produces:
      - text/html
      responses:
        "200":
          description: Страница админ-панели
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён (не администратор)
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Панель управления администратора
      tags:
      - admin
  /admin/audit:
    get:
      description: Отображает записи аудита с возможностью фильтрации по пользователю
        и действию, с пагинацией
      parameters:
      - default: 1
        description: Номер страницы
        in: query
        name: page
        type: integer
      - default: 20
        description: Количество записей на странице
        in: query
        name: per_page
        type: integer
      - description: ID пользователя
        in: query
        name: user_id
        type: string
      - description: Действие (create, update, delete, login и т.д.)
        in: query
        name: action
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Страница аудита
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Журнал аудита
      tags:
      - admin
  /admin/backups:
    get:
      description: Отображает список созданных резервных копий базы данных
      produces:
      - text/html
      responses:
        "200":
          description: Страница бекапов
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Список бекапов
      tags:
      - admin
  /admin/backups/create:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Создаёт новую резервную копию базы данных с помощью pg_dump
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /admin/backups
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Ошибка создания бекапа
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Создание бекапа
      tags:
      - admin
  /admin/games:
    get:
      description: Отображает все игры с фильтром по статусу (черновик / опубликована)
        и пагинацией
      parameters:
      - description: Статус игры (draft, published)
        in: query
        name: status
        type: string
      - default: 1
        description: Номер страницы
        in: query
        name: page
        type: integer
      - default: 20
        description: Количество записей на странице
        in: query
        name: per_page
        type: integer
      produces:
      - text/html
      responses:
        "200":
          description: Страница со списком игр
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Список игр (административный)
      tags:
      - admin
  /admin/games/{id}/delete:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Безвозвратно удаляет игру (доступно только администратору)
      parameters:
      - description: ID игры
        in: path
        name: id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /admin/games
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Удаление игры (административное)
      tags:
      - admin
  /admin/users:
    get:
      description: Отображает список всех пользователей с фильтром по роли и пагинацией
      parameters:
      - description: Роль пользователя (user, admin)
        in: query
        name: role
        type: string
      - default: 1
        description: Номер страницы
        in: query
        name: page
        type: integer
      - default: 20
        description: Количество записей на странице
        in: query
        name: per_page
        type: integer
      produces:
      - text/html
      responses:
        "200":
          description: Страница со списком пользователей
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Список пользователей
      tags:
      - admin
  /admin/users/{id}/delete:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Безвозвратно удаляет пользователя (административное действие)
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /admin/users
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Удаление пользователя
      tags:
      - admin
  /admin/users/{id}/toggle-admin:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Делает пользователя администратором или обычным пользователем
      parameters:
      - description: ID пользователя
        in: path
        name: id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /admin/users
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Переключение роли пользователя
      tags:
      - admin
  /api/settings/notifications:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: Флаги уведомлений
          schema:
            additionalProperties: true
            type: object
      summary: Получить флаги email-уведомлений
      tags:
      - notifications
    post:
      consumes:
      - application/json
      parameters:
      - description: Настройки уведомлений
        in: body
        name: settings
        required: true
        schema:
          additionalProperties: true
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: Настройки сохранены
          schema:
            additionalProperties: true
            type: object
      summary: Сохранить флаги email-уведомлений
      tags:
      - notifications
  /api/v1/calendar:
    get:
      description: Возвращает список игр за указанный месяц в формате JSON для отображения
        в календаре
      parameters:
      - description: Год
        in: query
        name: year
        type: integer
      - description: Месяц (1-12)
        in: query
        name: month
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: События календаря (ключ — дата, значение — массив игр)
          schema:
            additionalProperties: true
            type: object
        "500":
          description: Внутренняя ошибка
          schema:
            additionalProperties: true
            type: object
      summary: Данные календаря
      tags:
      - calendar
  /auth/forgot:
    get:
      consumes:
      - text/html
      description: Возвращает HTML-страницу с формой запроса на сброс пароля
      produces:
      - text/html
      responses:
        "200":
          description: Форма восстановления
          schema:
            type: string
      summary: Показать форму восстановления пароля
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Отправляет на email ссылку для сброса пароля
      parameters:
      - description: Email
        in: formData
        name: email
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Страница с сообщением об отправке
          schema:
            type: string
        "400":
          description: Ошибка валидации
          schema:
            additionalProperties: true
            type: object
      summary: Запрос на сброс пароля
      tags:
      - auth
  /auth/login:
    get:
      consumes:
      - text/html
      description: Возвращает HTML-страницу с формой входа в систему
      produces:
      - text/html
      responses:
        "200":
          description: Страница входа
          schema:
            type: string
      summary: Показать форму входа
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Вход в систему по email и паролю. При успехе устанавливает JWT-куку
      parameters:
      - description: Email пользователя
        in: formData
        name: email
        required: true
        type: string
      - description: Пароль
        in: formData
        name: password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /dashboard
          schema:
            type: string
        "400":
          description: Ошибка валидации
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Неверный email или пароль
          schema:
            additionalProperties: true
            type: object
      summary: Аутентификация пользователя
      tags:
      - auth
  /auth/logout:
    get:
      description: Удаляет JWT-куку и завершает сессию
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /
          schema:
            type: string
      summary: Выход из системы
      tags:
      - auth
  /auth/logout-all:
    post:
      description: Отзывает все refresh-токены пользователя
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Выход со всех устройств
      tags:
      - auth
  /auth/oauth/{provider}:
    get:
      description: Перенаправляет на страницу авторизации OAuth-провайдера (VK, Yandex,
        Google)
      parameters:
      - description: Провайдер (vk, yandex, google)
        in: path
        name: provider
        required: true
        type: string
      responses:
        "302":
          description: Перенаправление на OAuth-провайдера
          schema:
            type: string
        "400":
          description: Неизвестный провайдер
          schema:
            additionalProperties: true
            type: object
      summary: Начало OAuth-авторизации
      tags:
      - auth
  /auth/oauth/{provider}/callback:
    get:
      description: Завершает OAuth-авторизацию, создаёт или связывает пользователя
      parameters:
      - description: Провайдер (vk, yandex, google)
        in: path
        name: provider
        required: true
        type: string
      - description: Код авторизации
        in: query
        name: code
        required: true
        type: string
      - description: State-параметр
        in: query
        name: state
        required: true
        type: string
      responses:
        "302":
          description: Перенаправление на /dashboard
          schema:
            type: string
        "400":
          description: Ошибка авторизации
          schema:
            additionalProperties: true
            type: object
      summary: Обработка callback OAuth
      tags:
      - auth
  /auth/refresh:
    post:
      consumes:
      - application/json
      description: Получает новый access-токен по refresh-токену
      parameters:
      - description: Refresh-токен
        in: body
        name: refresh_token
        required: true
        schema:
          type: string
      produces:
      - application/json
      responses:
        "200":
          description: Новый access-токен и время жизни
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Невалидный refresh-токен
          schema:
            additionalProperties: true
            type: object
      summary: Обновление access-токена
      tags:
      - auth
  /auth/register:
    get:
      consumes:
      - text/html
      description: Возвращает HTML-страницу с формой регистрации нового пользователя
      produces:
      - text/html
      responses:
        "200":
          description: Страница регистрации
          schema:
            type: string
      summary: Показать форму регистрации
      tags:
      - auth
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Создаёт нового пользователя с указанными email, паролем и именем.
        Требуется подтверждение email
      parameters:
      - description: Email
        in: formData
        name: email
        required: true
        type: string
      - description: Пароль (минимум 8 символов)
        in: formData
        name: password
        required: true
        type: string
      - description: Имя пользователя
        in: formData
        name: name
        required: true
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /auth/login
          schema:
            type: string
        "400":
          description: Ошибка валидации
          schema:
            additionalProperties: true
            type: object
        "409":
          description: Email уже занят
          schema:
            additionalProperties: true
            type: object
        "429":
          description: Слишком много запросов
          schema:
            additionalProperties: true
            type: object
      summary: Регистрация пользователя
      tags:
      - auth
  /auth/reset:
    post:
      consumes:
      - application/x-www-form-urlencoded
      description: Устанавливает новый пароль по токену сброса
      parameters:
      - description: Токен сброса
        in: formData
        name: token
        required: true
        type: string
      - description: Новый пароль
        in: formData
        name: password
        required: true
        type: string
      produces:
      - text/html
      responses:
        "302":
          description: Перенаправление на /auth/login
          schema:
            type: string
        "400":
          description: Ошибка валидации
          schema:
            additionalProperties: true
            type: object
      summary: Сброс пароля
      tags:
      - auth
  /auth/reset/{resetCode}:
    get:
      consumes:
      - text/html
      description: Возвращает HTML-страницу с формой установки нового пароля по коду
        сброса
      parameters:
      - description: Код сброса пароля
        in: path
        name: resetCode
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Форма сброса пароля
          schema:
            type: string
      summary: Показать форму сброса пароля
      tags:
      - auth
  /auth/verify:
    get:
      description: Активирует email пользователя по токену из письма
      parameters:
      - description: Токен подтверждения
        in: query
        name: token
        required: true
        type: string
      produces:
      - text/html
      responses:
        "200":
          description: Страница подтверждения
          schema:
            type: string
        "400":
          description: Неверный или просроченный токен
          schema:
            additionalProperties: true
            type: object
      summary: Подтверждение email
      tags:
      - auth
  /calendar:
    get:
      description: Возвращает HTML-страницу с календарём игр, где отображаются опубликованные
        игры по месяцам
      produces:
      - text/html
      responses:
        "200":
          description: Страница календаря
          schema:
            type: string
      summary: Страница календаря
      tags:
      - calendar
  /calendar/export.ics:
    get:
      description: Возвращает .ics файл с предстоящими играми для импорта в внешние
        календари (Google Calendar, Apple Calendar и др.)
      produces:
      - text/calendar
      responses:
        "200":
          description: iCalendar файл
          schema:
            type: string
        "500":
          description: Внутренняя ошибка
          schema:
            additionalProperties: true
            type: object
      summary: Экспорт календаря в iCal
      tags:
      - calendar
  /dashboard:
    get:
      description: Отображает главную страницу личного кабинета пользователя
      produces:
      - text/html
      responses:
        "200":
          description: Личный кабинет
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Личный кабинет
      tags:
      - dashboard
  /follow/{id}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: ID автора
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешная отписка
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный запрос
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Отписаться от автора
      tags:
      - social
    post:
      consumes:
      - application/json
      parameters:
      - description: ID автора
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Успешная подписка
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный запрос
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Подписаться на автора
      tags:
      - social
  /follow/{id}/check:
    get:
      parameters:
      - description: ID автора
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Результат проверки
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Неверный запрос
          schema:
            additionalProperties: true
            type: object
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Проверить подписку
      tags:
      - social
  /game/{passing_id}:
    get:
      parameters:
      - description: ID прохождения
        in: path
        name: passing_id
        required: true
        type: integer
      produces:
      - text/html
      responses:
        "200":
          description: Страница прохождения
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён
          schema:
            additionalProperties: true
            type: object
        "404":
          description: Прохождение не найдено
          schema:
            additionalProperties: true
            type: object
      security:
      - JWT: []
      summary: Страница прохождения уровня
      tags:
      - gameplay
  /game/{passing_id}/accept:
    post:
      parameters:
      - description: ID прохождения
        in: path
        name: passing_id
        required: true
        type: integer
      responses:
        "302":
          description: Перенаправление на страницу прохождения
          schema:
            type: string
        "401":
          description: Требуется аутентификация
          schema:
            additionalProperties: true
            type: object
        "403":
          description: Доступ запрещён
          schema:
            additionalProperties: true
            type: object
