# monitoring/alerts.yml
# Пример правил для Prometheus Alertmanager

groups:
  - name: gengine_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(gengine_http_requests_total{status=~"5.."}[5m]) / rate(gengine_http_requests_total[5m]) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High HTTP error rate"
          description: "{{ $value }}% of requests are failing with 5xx errors."

      - alert: HighResponseTime
        expr: histogram_quantile(0.95, rate(gengine_http_request_duration_seconds_bucket[5m])) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Slow HTTP responses"
          description: "95th percentile response time is {{ $value }} seconds."

      - alert: HighDatabaseConnections
        expr: gengine_database_connections > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High database connections"
          description: "Database connections are at {{ $value }}."

      - alert: QueueSizeGrowing
        expr: gengine_email_queue_size > 50
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Email queue is growing"
          description: "Email queue size is {{ $value }}."

      - alert: NoActiveGames
        expr: gengine_games_active == 0
        for: 1h
        labels:
          severity: info
        annotations:
          summary: "No active games"
          description: "There are no active (published) games."

      - alert: WebSocketConnectionsDropped
        expr: delta(gengine_websocket_connections[1m]) < -10
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "WebSocket connections dropped"
          description: "WebSocket connections dropped by {{ $value }} in last minute."