{{define "questions-edit.html"}}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Редактирование вопроса</h1>

    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <form action="/games/{{.GameID}}/levels/{{.LevelID}}/questions/{{.Question.ID}}" method="POST" class="card space-y-4">
        <input type="hidden" name="_method" value="PUT">
        <input type="hidden" name="_csrf" value="{{.csrf}}">

        <!-- Текст вопроса -->
        <div>
            <label for="text" class="block text-sm font-medium text-gray-700 mb-1">Текст вопроса</label>
            <input type="text" name="text" id="text" value="{{.Question.Text}}" required
                   class="w-full rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.text}}border-red-500{{else}}border-gray-300{{end}}">
            {{if .Errors.text}}<p class="text-red-500 text-xs mt-1">{{.Errors.text}}</p>{{end}}
        </div>

        <!-- Подсказка -->
        <div>
            <label for="hint" class="block text-sm font-medium text-gray-700 mb-1">Подсказка</label>
            <input type="text" name="hint" id="hint" value="{{.Question.Hint}}"
                   class="w-full rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.hint}}border-red-500{{else}}border-gray-300{{end}}">
            {{if .Errors.hint}}<p class="text-red-500 text-xs mt-1">{{.Errors.hint}}</p>{{end}}
        </div>

        <!-- Кнопки -->
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn btn-primary text-sm">Сохранить</button>
            <a href="/games/{{.GameID}}/levels/{{.LevelID}}/questions" class="btn btn-outline text-sm">Отмена</a>
        </div>
    </form>
</div>
{{end}}
