{{define "levels-new.html"}}
<h1>Новый уровень</h1>
{{if .Error}}<p style="color:red">{{.Error}}</p>{{end}}
<form action="/games/{{.GameID}}/levels" method="POST">
    <input type="hidden" name="_csrf" value="{{.csrf}}">
    <div>
        <label>Название:</label>
        <input type="text" name="name" required>
    </div>
    <div>
        <label>Описание:</label>
        <textarea name="description" rows="4"></textarea>
    </div>
    <div>
        <label>Позиция:</label>
        <input type="number" name="position" value="1" min="1">
    </div>
    <div>
        <label>Тип уровня:</label>
        <select name="type">
            <option value="single">Обычный</option>
            <option value="checkpoint">Чекпоинт</option>
            <option value="parallel_group">Параллельная группа</option>
            <option value="blackbox">Чёрный ящик</option>
            <option value="file_upload">Файловый ответ</option>
        </select>
    </div>
    <div>
        <label>Требует подтверждения автором:</label>
        <input type="checkbox" name="requires_confirmation" value="true">
    </div>
    <div>
        <label>Широта (Latitude):</label>
        <input type="text" name="latitude" placeholder="например 55.7558">
    </div>
    <div>
        <label>Долгота (Longitude):</label>
        <input type="text" name="longitude" placeholder="например 37.6173">
    </div>
    <button type="submit" class="button">Создать</button>
</form>
<a href="/games/{{.GameID}}/levels">Назад к уровням</a>
{{end}}
