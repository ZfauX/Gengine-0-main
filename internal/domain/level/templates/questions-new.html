{{define "questions-new.html"}}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Новый вопрос</h1>

    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <form action="/games/{{.GameID}}/levels/{{.LevelID}}/questions" method="POST" class="card space-y-4">
        <input type="hidden" name="_csrf" value="{{.csrf}}">

        <!-- Текст вопроса -->
        <div>
            <label for="text" class="block text-sm font-medium text-gray-700 mb-1">Текст вопроса</label>
            <input type="text" name="text" id="text" required
                   class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
        </div>

        <!-- Подсказка -->
        <div>
            <label for="hint" class="block text-sm font-medium text-gray-700 mb-1">Подсказка</label>
            <input type="text" name="hint" id="hint"
                   class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
        </div>

        <!-- Кнопки -->
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn btn-primary text-sm">Создать</button>
            <a href="/games/{{.GameID}}/levels/{{.LevelID}}/questions" class="btn btn-outline text-sm">Отмена</a>
        </div>
    </form>
</div>
{{end}}
