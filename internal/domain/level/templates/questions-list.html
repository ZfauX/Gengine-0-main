{{define "questions-list.html"}}
<div class="max-w-4xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Вопросы уровня</h1>

    <div class="mb-6">
        <a href="/games/{{.GameID}}/levels/{{.LevelID}}/questions/new" class="btn btn-primary text-sm">+ Добавить вопрос</a>
    </div>

    {{if .Questions}}
    <div class="space-y-3">
        {{range .Questions}}
        <div class="card flex flex-wrap items-center gap-3 p-4 hover:shadow-md transition">
            <div class="flex-1 min-w-[180px]">
                <a href="/games/{{$.GameID}}/levels/{{$.LevelID}}/questions/{{.ID}}" class="text-blue-600 hover:underline font-medium text-gray-800">{{.Text}}</a>
            </div>
            <div class="flex flex-wrap items-center gap-2">
                <a href="/games/{{$.GameID}}/levels/{{$.LevelID}}/questions/{{.ID}}/edit" class="btn btn-outline text-xs" title="Редактировать">✎</a>
                <a href="/games/{{$.GameID}}/levels/{{$.LevelID}}/questions/{{.ID}}/answers" class="btn btn-outline text-xs">Ответы</a>
                <form action="/games/{{$.GameID}}/levels/{{$.LevelID}}/questions/{{.ID}}" method="POST" class="inline" onsubmit="return confirm('Удалить вопрос?')">
                    <input type="hidden" name="_method" value="DELETE">
                    <input type="hidden" name="_csrf" value="{{$.csrf}}">
                    <button type="submit" class="btn btn-danger text-xs">Удалить</button>
                </form>
            </div>
        </div>
        {{end}}
    </div>
    {{else}}
    <div class="card text-center py-12">
        <p class="text-gray-500">Вопросов пока нет.</p>
        <p class="mt-2 text-sm text-gray-400"><a href="/games/{{.GameID}}/levels/{{.LevelID}}/questions/new" class="text-blue-600 hover:underline">Создайте первый вопрос</a></p>
    </div>
    {{end}}

    <div class="mt-6">
        <a href="/games/{{.GameID}}/levels/{{.LevelID}}" class="btn btn-outline text-sm">← Назад к уровню</a>
    </div>
</div>
{{end}}
