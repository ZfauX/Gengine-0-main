{{define "tournaments-add_game.html"}}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Добавить игру в турнир</h1>

    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <form action="/tournaments/{{.TournamentID}}/games/add" method="POST" class="card space-y-4">
        <input type="hidden" name="_csrf" value="{{.csrf}}">

        <!-- Выбор игры -->
        <div>
            <label for="game_id" class="block text-sm font-medium text-gray-700 mb-1">Игра</label>
            <select name="game_id" id="game_id" required
                    class="w-full rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.game_id}}border-red-500{{else}}border-gray-300{{end}}">
                <option value="">-- выберите игру --</option>
                {{range .Games}}
                    <option value="{{.ID}}">{{.Name}}</option>
                {{else}}
                    <option value="" disabled>Нет доступных игр</option>
                {{end}}
            </select>
            {{if .Errors.game_id}}<p class="text-red-500 text-xs mt-1">{{.Errors.game_id}}</p>{{end}}
        </div>

        <!-- Кнопки -->
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn btn-primary text-sm">Добавить</button>
            <a href="/tournaments/{{.TournamentID}}" class="btn btn-outline text-sm">Отмена</a>
        </div>
    </form>
</div>
{{end}}
