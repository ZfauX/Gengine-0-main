{{define "games-edit.html"}}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Редактировать игру</h1>

    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <!-- Исправлен action с /update на /edit -->
    <form action="/games/{{.Game.ID}}/edit" method="POST" enctype="multipart/form-data" class="card space-y-4">
        <input type="hidden" name="_csrf" value="{{.csrf}}">

        <!-- Название -->
        <div>
            <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Название</label>
            <input type="text" name="name" id="name" value="{{.Game.Name}}" required
                   class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
        </div>

        <!-- Описание -->
        <div>
            <label for="description" class="block text-sm font-medium text-gray-700 mb-1">Описание</label>
            <textarea name="description" id="description" rows="4"
                      class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">{{.Game.Description}}</textarea>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Дата и время начала -->
            <div>
                <label for="starts_at" class="block text-sm font-medium text-gray-700 mb-1">Дата и время начала</label>
                <input type="datetime-local" name="starts_at" id="starts_at"
                       value="{{if .Game.StartsAt}}{{.Game.StartsAt.Format "2006-01-02T15:04"}}{{end}}"
                       class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
            </div>

            <!-- Крайний срок регистрации -->
            <div>
                <label for="registration_deadline" class="block text-sm font-medium text-gray-700 mb-1">Крайний срок регистрации</label>
                <input type="datetime-local" name="registration_deadline" id="registration_deadline"
                       value="{{if .Game.RegistrationDeadline}}{{.Game.RegistrationDeadline.Format "2006-01-02T15:04"}}{{end}}"
                       class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Максимальное количество команд -->
            <div>
                <label for="max_team_number" class="block text-sm font-medium text-gray-700 mb-1">Максимальное количество команд</label>
                <input type="number" name="max_team_number" id="max_team_number"
                       value="{{.Game.MaxTeamNumber}}" min="1"
                       class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
            </div>

            <!-- Видимость -->
            <div>
                <label for="visibility" class="block text-sm font-medium text-gray-700 mb-1">Видимость</label>
                <select name="visibility" id="visibility"
                        class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                    <option value="public" {{if eq .Game.Visibility "public"}}selected{{end}}>Публичная</option>
                    <option value="private" {{if eq .Game.Visibility "private"}}selected{{end}}>Приватная</option>
                    <option value="unlisted" {{if eq .Game.Visibility "unlisted"}}selected{{end}}>Скрытая</option>
                </select>
            </div>
        </div>

        <!-- Обложка -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Обложка игры</label>
            {{if .Game.CoverPath}}
            <div class="mb-3">
                <img src="{{.Game.CoverPath}}" alt="Обложка" class="max-h-32 rounded-md border border-gray-200">
                <div class="mt-2 flex items-center">
                    <input type="checkbox" name="delete_cover" id="delete_cover" value="1"
                           class="rounded border-gray-300 text-blue-600 shadow-sm focus:ring-blue-500">
                    <label for="delete_cover" class="ml-2 text-sm text-gray-600">Удалить обложку</label>
                </div>
            </div>
            {{end}}
            <input type="file" name="cover" accept="image/jpeg,image/png,image/webp"
                   class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-md file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer">
        </div>

        <!-- Кнопки -->
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn btn-primary text-sm">Сохранить</button>
            <a href="/games/{{.Game.ID}}" class="btn btn-outline text-sm">Отмена</a>
        </div>
    </form>
</div>
{{end}}
