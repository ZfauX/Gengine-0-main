{{define "games-settings.html"}}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Настройки игры «{{.Game.Name}}»</h1>

    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <form action="/games/{{.Game.ID}}/settings" method="POST" class="card space-y-4">
        <input type="hidden" name="_csrf" value="{{.csrf}}">

        <!-- Разрешить подсказки -->
        <div class="flex items-center">
            <input type="checkbox" name="allow_hints" id="allow_hints" value="true"
                   {{if .Settings.AllowHints}}checked{{end}}
                   class="rounded border-gray-300 text-blue-600 shadow-sm focus:ring-blue-500">
            <label for="allow_hints" class="ml-2 text-sm text-gray-700">Разрешить подсказки</label>
        </div>

        <!-- Штраф за подсказку -->
        <div>
            <label for="hint_penalty_seconds" class="block text-sm font-medium text-gray-700 mb-1">Штраф за подсказку (секунд)</label>
            <input type="number" name="hint_penalty_seconds" id="hint_penalty_seconds"
                   value="{{.Settings.HintPenaltySeconds}}" min="0"
                   class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.hint_penalty_seconds}}border-red-500{{end}}">
            <p class="text-red-500 text-xs mt-1">{{.Errors.hint_penalty_seconds}}</p>
        </div>

        <!-- Максимальное количество подсказок -->
        <div>
            <label for="max_hints" class="block text-sm font-medium text-gray-700 mb-1">Максимальное количество подсказок</label>
            <input type="number" name="max_hints" id="max_hints"
                   value="{{.Settings.MaxHints}}" min="0"
                   class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.max_hints}}border-red-500{{end}}">
            <p class="text-red-500 text-xs mt-1">{{.Errors.max_hints}}</p>
        </div>

        <!-- Лимит времени на уровень -->
        <div>
            <label for="per_level_time_limit" class="block text-sm font-medium text-gray-700 mb-1">Лимит времени на уровень (минут, 0 — без ограничения)</label>
            <input type="number" name="per_level_time_limit" id="per_level_time_limit"
                   value="{{.Settings.PerLevelTimeLimit}}" min="0"
                   class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.per_level_time_limit}}border-red-500{{end}}">
            <p class="text-red-500 text-xs mt-1">{{.Errors.per_level_time_limit}}</p>
        </div>

        <!-- Скрывать ответы до финиша -->
        <div class="flex items-center">
            <input type="checkbox" name="hide_answers_until_finished" id="hide_answers_until_finished" value="true"
                   {{if .Settings.HideAnswersUntilFinished}}checked{{end}}
                   class="rounded border-gray-300 text-blue-600 shadow-sm focus:ring-blue-500">
            <label for="hide_answers_until_finished" class="ml-2 text-sm text-gray-700">Скрывать ответы до финиша</label>
        </div>

        <!-- Автоматический старт -->
        <div class="flex items-center">
            <input type="checkbox" name="auto_start" id="auto_start" value="true"
                   {{if .Settings.AutoStart}}checked{{end}}
                   class="rounded border-gray-300 text-blue-600 shadow-sm focus:ring-blue-500">
            <label for="auto_start" class="ml-2 text-sm text-gray-700">Автоматический старт в указанное время</label>
        </div>

        <!-- Кнопки -->
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn btn-primary text-sm">Сохранить</button>
            <a href="/games/{{.Game.ID}}" class="btn btn-outline text-sm">Отмена</a>
        </div>
    </form>
</div>
{{end}}
