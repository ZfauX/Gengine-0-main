{{define "reviews-new.html"}}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Оставить отзыв</h1>

    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <form action="/games/{{.GameID}}/review" method="POST" class="card space-y-4">
        <input type="hidden" name="_csrf" value="{{.csrf}}">

        <!-- Оценка -->
        <div>
            <label for="rating" class="block text-sm font-medium text-gray-700 mb-1">Оценка (1–10)</label>
            <select name="rating" id="rating" required
                    class="w-full rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.rating}}border-red-500{{else}}border-gray-300{{end}}">
                <option value="">--</option>
                <option value="1">1 — Ужасно</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5 — Средне</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10 — Отлично</option>
            </select>
            {{if .Errors.rating}}<p class="text-red-500 text-xs mt-1">{{.Errors.rating}}</p>{{end}}
        </div>

        <!-- Комментарий -->
        <div>
            <label for="comment" class="block text-sm font-medium text-gray-700 mb-1">Комментарий (необязательно)</label>
            <textarea name="comment" id="comment" rows="4" placeholder="Ваш комментарий..."
                      class="w-full rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.comment}}border-red-500{{else}}border-gray-300{{end}}"></textarea>
            {{if .Errors.comment}}<p class="text-red-500 text-xs mt-1">{{.Errors.comment}}</p>{{end}}
        </div>

        <!-- Кнопки -->
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn btn-primary text-sm">Отправить</button>
            <a href="/games/{{.GameID}}" class="btn btn-outline text-sm">Отмена</a>
        </div>
    </form>
</div>
{{end}}
