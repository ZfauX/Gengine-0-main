{{define "follow-list.html"}}
<h1>Мои подписки</h1>

<meta name="csrf-token" content="{{.csrf}}">

{{if .Authors}}
<ul style="list-style:none; padding:0;">
{{range .Authors}}
    <li class="card" style="margin-bottom:15px; display:flex; justify-content:space-between; align-items:center;">
        <div>
            <strong>{{.Name}}</strong>
            {{if .Email}}<span style="color:#888; margin-left:10px;">{{.Email}}</span>{{end}}
        </div>
        <button class="button danger" onclick="unfollow({{.ID}}, '{{.Name}}')">Отписаться</button>
    </li>
{{end}}
</ul>
{{else}}
<div class="card">
    <p>Вы пока ни на кого не подписаны.</p>
    <p>Подпишитесь на авторов, чтобы первыми узнавать об их новых играх.</p>
</div>
{{end}}

<a href="/dashboard" class="button">Назад в личный кабинет</a>

<script>
    function getCsrfToken() {
        return document.querySelector('meta[name="csrf-token"]').getAttribute('content');
    }

    function unfollow(authorID, authorName) {
        if (!confirm(`Отписаться от ${authorName}?`)) return;
        fetch('/follow/' + authorID, {
            method: 'DELETE',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRF-TOKEN': getCsrfToken()
            }
        })
        .then(r => r.json())
        .then(data => {
            if (data.status === 'unfollowed') {
                location.reload();
            } else {
                alert('Ошибка: ' + (data.error || 'не удалось отписаться'));
            }
        });
    }
</script>
{{end}}
