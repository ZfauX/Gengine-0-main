{{define "monitor-page.html"}}
<div class="max-w-7xl mx-auto" data-game-id="{{.GameID}}">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">
        Мониторинг игры <span class="text-sm font-normal text-gray-500">(обновляется в реальном времени)</span>
    </h1>

    <div class="card">
        <div id="teams-container" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
            <!-- Карточки команд будут отображаться здесь -->
        </div>
        <div id="connection-status" class="mt-4 text-sm text-gray-500"></div>
    </div>
</div>

<script>
    (function() {
        const container = document.querySelector('[data-game-id]');
        if (!container) return;

        const gameID = container.dataset.gameId;
        const csrfToken = '{{.csrf}}';
        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${location.host}/games/${gameID}/monitor/ws`;
        let socket;
        let teamsData = [];
        let reconnectAttempts = 0;
        let reconnectTimer = null;
        const MAX_RECONNECT_DELAY = 30000;
        const BASE_RECONNECT_DELAY = 1000;
        const MAX_RECONNECT_ATTEMPTS = 5;
        const POLL_INTERVAL = 10000;

        const teamsContainer = document.getElementById('teams-container');
        const statusEl = document.getElementById('connection-status');
        let pollingTimer = null;
        let wsConnected = false;

        function updateConnectionStatus(text, color = '#888') {
            if (statusEl) {
                statusEl.textContent = text;
                statusEl.style.color = color;
            }
        }

        function connect() {
            if (wsConnected) return;
            socket = new WebSocket(wsUrl);
            socket.onopen = function() {
                console.log('Мониторинг: WebSocket подключён');
                updateConnectionStatus('Подключено (реальное время)', '#2ecc71');
                reconnectAttempts = 0;
                wsConnected = true;
                stopPolling();
            };
            socket.onmessage = function(e) {
                try {
                    const data = JSON.parse(e.data);
                    // Проверяем, является ли это уведомлением о старте игры
                    if (data && data.type === 'game_started') {
                        handleGameStartedNotification(data);
                        return;
                    }
                    // Иначе это snapshot данных мониторинга
                    teamsData = data;
                    renderTeams();
                } catch (err) {
                    console.error('Мониторинг: ошибка парсинга данных', err);
                }
            };
            socket.onclose = function(event) {
                wsConnected = false;
                if (event.wasClean) {
                    console.log('Мониторинг: WebSocket закрыт чисто');
                } else {
                    console.log('Мониторинг: WebSocket обрыв, переподключение...');
                }
                scheduleReconnect();
            };
            socket.onerror = function(error) {
                console.error('Мониторинг: WebSocket ошибка', error);
                updateConnectionStatus('Ошибка соединения', '#e74c3c');
            };
        }

        function scheduleReconnect() {
            if (reconnectTimer) clearTimeout(reconnectTimer);

            if (reconnectAttempts >= MAX_RECONNECT_ATTEMPTS) {
                console.log('Мониторинг: превышен лимит попыток, переключение на polling');
                updateConnectionStatus('Переключение на периодическое обновление...', '#e67e22');
                startPolling();
                return;
            }

            const delay = Math.min(MAX_RECONNECT_DELAY, BASE_RECONNECT_DELAY * Math.pow(2, reconnectAttempts));
            reconnectAttempts++;
            console.log(`Мониторинг: переподключение через ${delay}ms (попытка ${reconnectAttempts})`);
            updateConnectionStatus(`Переподключение через ${Math.round(delay/1000)}с...`, '#e67e22');
            reconnectTimer = setTimeout(() => {
                connect();
            }, delay);
        }

        // Polling fallback
        function startPolling() {
            stopPolling();
            fetchInitialData();
            pollingTimer = setInterval(fetchInitialData, POLL_INTERVAL);
        }

        function stopPolling() {
            if (pollingTimer) {
                clearInterval(pollingTimer);
                pollingTimer = null;
            }
        }

        function fetchInitialData() {
            fetch(`/games/${gameID}/monitor/data`, {
                headers: { 'X-CSRF-TOKEN': csrfToken }
            })
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.json();
            })
            .then(data => {
                teamsData = data.teams || data || [];
                renderTeams();
                updateConnectionStatus('Обновление каждые 10с (polling)', '#3498db');
                // Try reconnecting WS in background
                if (!wsConnected && reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                    reconnectAttempts = 0;
                    connect();
                }
            })
            .catch(err => {
                console.error('Мониторинг: ошибка polling', err);
                updateConnectionStatus('Ошибка получения данных', '#e74c3c');
            });
        }

        function formatTime(seconds) {
            if (seconds <= 0) return "0:00";
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function renderTeams() {
            teamsContainer.innerHTML = '';
            if (!teamsData || teamsData.length === 0) {
                teamsContainer.innerHTML = `<div class="col-span-full text-center text-gray-500 py-8">Нет данных о командах</div>`;
                return;
            }

            teamsData.forEach(team => {
                const progressPercent = team.total_levels > 0 ? (team.completed_levels / team.total_levels * 100) : 0;
                const card = document.createElement('div');
                card.className = 'card fade-in hover:shadow-md transition-all duration-200 border-l-4 ' + 
                    (team.suspicious ? 'border-yellow-500 bg-yellow-50' : 'border-blue-500');

                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="text-lg font-semibold text-gray-800 truncate">${escapeHtml(team.team_name)}</h3>
                        ${team.finished ? '<span class="inline-flex px-2 py-1 text-xs font-bold rounded-full bg-green-100 text-green-800">Финиш!</span>' : ''}
                        ${team.place ? `<span class="inline-flex px-2 py-1 text-xs font-bold rounded-full bg-blue-100 text-blue-800">#${team.place}</span>` : ''}
                    </div>

                    <div class="w-full bg-gray-200 rounded-full h-2.5 mb-3">
                        <div class="bg-blue-600 h-2.5 rounded-full transition-all duration-500" style="width: ${progressPercent}%"></div>
                    </div>

                    <div class="grid grid-cols-2 gap-1 text-sm">
                        <div><span class="text-gray-500">Уровней:</span> <span class="font-medium">${team.completed_levels}/${team.total_levels}</span></div>
                        <div><span class="text-gray-500">Текущий:</span> <span class="font-medium">${team.current_level ? '#' + team.current_level : '—'}</span></div>
                        <div><span class="text-gray-500">Время:</span> <span class="font-mono">${team.total_time || '—'}</span></div>
                        <div><span class="text-gray-500">Попыток:</span> <span class="font-medium">${team.attempts || 0}</span></div>
                    </div>

                    ${team.suspicious ? `
                        <div class="mt-3 text-xs text-yellow-800 bg-yellow-100 p-2 rounded-md flex items-center gap-1">
                            <span>⚠️</span> ${escapeHtml(team.suspicious_reason || 'Подозрительная активность')}
                        </div>
                    ` : ''}

                    ${!team.finished && !team.suspicious ? `
                        <div class="mt-3">
                            <button onclick="disqualifyTeam(${team.team_id})" class="btn btn-danger text-xs w-full">
                                Дисквалифицировать
                            </button>
                        </div>
                    ` : ''}
                `;
                teamsContainer.appendChild(card);
            });
        }

        // Обработка уведомления о старте игры
        function handleGameStartedNotification(data) {
            console.log('Мониторинг: игра началась —', data.team_name);
            
            // Обновляем статус соединения
            updateConnectionStatus('✅ ' + data.team_name + ' начала игру!', '#2ecc71');
            
            // Перезагружаем данные через 1 секунду чтобы увидеть обновление
            setTimeout(() => {
                if (wsConnected) {
                    // WebSocket активен — данные придут автоматически
                } else {
                    // Fallback на polling
                    fetchInitialData();
                }
            }, 1000);
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return String(text).replace(/[&<>"']/g, m => map[m]);
        }

        // Дисквалификация команды с подтверждением
        window.disqualifyTeam = function(teamId) {
            if (!confirm('Дисквалифицировать команду? Капитан получит уведомление по email.')) {
                return;
            }

            fetch(`/games/${gameID}/disqualify`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: `_csrf=${encodeURIComponent(csrfToken)}&team_id=${teamId}`
            })
            .then(r => {
                if (!r.ok) throw new Error(`HTTP ${r.status}`);
                return r.text();
            })
            .then(() => {
                console.log(`Команда #${teamId} дисквалифицирована`);
            })
            .catch(err => {
                console.error('Дисквалификация:', err);
                alert('Ошибка при дисквалификации: ' + err.message);
            });
        };

        // Запуск
        connect();

        // Очистка при уходе
        window.addEventListener('beforeunload', function() {
            if (socket) {
                socket.onclose = null;
                socket.close();
            }
            if (reconnectTimer) clearTimeout(reconnectTimer);
            stopPolling();
        });
    })();
</script>
{{end}}
