{{define "logs-list.html"}}
<div class="max-w-4xl mx-auto" data-game-id="{{.GameID}}">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Логи игры</h1>

    <div class="card">
        <ul id="log-list" class="divide-y divide-gray-100 max-h-[70vh] overflow-y-auto" data-total-pages="{{.TotalPages}}">
            {{range .Logs}}
            <li class="py-2 text-sm text-gray-700">{{.CreatedAt.Format "15:04:05"}} — {{.Message}}</li>
            {{else}}
            <li class="py-2 text-sm text-gray-500">Логов пока нет.</li>
            {{end}}
        </ul>
        <div id="pagination" class="flex items-center justify-center gap-2 mt-4 text-sm {{if le .TotalPages 1}}hidden{{end}}">
            <button id="prev-page" class="px-3 py-1 border rounded hover:bg-gray-100 disabled:opacity-40" disabled>← Назад</button>
            <span class="px-2 text-gray-600">Стр. <span id="current-page">{{.Page}}</span> из <span id="total-pages">{{.TotalPages}}</span></span>
            <button id="next-page" class="px-3 py-1 border rounded hover:bg-gray-100 disabled:opacity-40" {{if ge .Page .TotalPages}}disabled{{end}}>Вперёд →</button>
        </div>
        <div id="connection-status" class="mt-3 text-sm text-gray-500"></div>
    </div>
</div>

<script nonce="{{.csp_nonce}}">
    (function() {
        const container = document.querySelector('[data-game-id]');
        if (!container) return;

        const gameID = container.dataset.gameId;
        const totalPages = parseInt(document.getElementById('log-list')?.dataset.totalPages || '1', 10);
        let currentPage = parseInt(document.getElementById('current-page')?.textContent || '1', 10);

        // Pagination
        const prevBtn = document.getElementById('prev-page');
        const nextBtn = document.getElementById('next-page');
        const paginationEl = document.getElementById('pagination');

        function loadPage(page) {
            if (page < 1 || page > totalPages) return;
            fetch('/games/' + gameID + '/logs?page=' + page + '&per_page=50', { headers: { 'X-Requested-With': 'XMLHttpRequest' } })
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const newList = doc.getElementById('log-list');
                    if (newList) {
                        document.getElementById('log-list').innerHTML = newList.innerHTML;
                        document.getElementById('current-page').textContent = page;
                        currentPage = page;
                        prevBtn.disabled = page <= 1;
                        nextBtn.disabled = page >= totalPages;
                    }
                });
        }

        if (prevBtn) prevBtn.addEventListener('click', function() { loadPage(currentPage - 1); });
        if (nextBtn) nextBtn.addEventListener('click', function() { loadPage(currentPage + 1); });
        const wsProtocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        const wsUrl = `${wsProtocol}//${location.host}/games/${gameID}/logs/ws`;
        let socket;
        let reconnectAttempts = 0;
        let reconnectTimer = null;
        const MAX_RECONNECT_DELAY = 30000;
        const BASE_RECONNECT_DELAY = 1000;

        const statusEl = document.getElementById('connection-status');
        const logList = document.getElementById('log-list');

        function updateConnectionStatus(text, color = '#888') {
            if (statusEl) {
                statusEl.textContent = text;
                statusEl.style.color = color;
            }
        }

        function connect() {
            socket = new WebSocket(wsUrl);
            socket.onopen = function() {
                console.log('Логи: WebSocket подключён');
                updateConnectionStatus('Подключено', '#2ecc71');
                reconnectAttempts = 0;
            };
            socket.onmessage = function(e) {
                const data = JSON.parse(e.data);
                const li = document.createElement('li');
                li.className = 'py-2 text-sm text-gray-700 border-b border-gray-100';
                li.textContent = data.timestamp + " - " + data.message;
                // Удаляем сообщение "Логов пока нет", если оно есть
                const emptyMsg = logList.querySelector('li:only-child.text-gray-500');
                if (emptyMsg) emptyMsg.remove();
                logList.appendChild(li);
                logList.scrollTop = logList.scrollHeight;
            };
            socket.onclose = function(event) {
                if (!event.wasClean) {
                    console.log('Логи: WebSocket обрыв, переподключаю...');
                }
                updateConnectionStatus('Переподключение...', '#e67e22');
                scheduleReconnect();
            };
            socket.onerror = function(error) {
                console.error('Логи: WebSocket ошибка', error);
                updateConnectionStatus('Ошибка соединения', '#e74c3c');
            };
        }

        function scheduleReconnect() {
            if (reconnectTimer) clearTimeout(reconnectTimer);
            const delay = Math.min(MAX_RECONNECT_DELAY, BASE_RECONNECT_DELAY * Math.pow(2, reconnectAttempts));
            reconnectAttempts++;
            console.log(`Логи: переподключение через ${delay}ms (попытка ${reconnectAttempts})`);
            updateConnectionStatus(`Переподключение через ${Math.round(delay/1000)}с...`, '#e67e22');
            reconnectTimer = setTimeout(() => {
                connect();
            }, delay);
        }

        connect();

        window.addEventListener('beforeunload', function() {
            if (socket) {
                socket.onclose = null;
                socket.close();
            }
            if (reconnectTimer) clearTimeout(reconnectTimer);
        });
    })();
</script>
{{end}}
