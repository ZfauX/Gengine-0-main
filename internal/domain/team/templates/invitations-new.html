{{define "invitations-new.html"}}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Новое приглашение</h1>

    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <form action="/games/{{.GameID}}/teams/{{.TeamID}}/invitations" method="POST" class="card space-y-4">
        <input type="hidden" name="_csrf" value="{{.csrf}}">

        <!-- Поле для ID пользователя -->
        <div>
            <label for="user_id" class="block text-sm font-medium text-gray-700 mb-1">ID пользователя</label>
            <input type="text" name="user_id" id="user_id" placeholder="ID пользователя" required
                   class="w-full rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.user_id}}border-red-500{{else}}border-gray-300{{end}}">
            {{if .Errors.user_id}}<p class="text-red-500 text-xs mt-1">{{.Errors.user_id}}</p>{{end}}
        </div>

        <!-- Кнопки -->
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn btn-primary text-sm">Пригласить</button>
            <a href="/games/{{.GameID}}/teams/{{.TeamID}}/invitations" class="btn btn-outline text-sm">Отмена</a>
        </div>
    </form>
</div>
{{end}}
