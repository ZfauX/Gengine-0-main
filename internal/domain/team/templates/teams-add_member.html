{{define "teams-add_member.html"}}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Добавить участника</h1>

    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <form action="/games/{{.GameID}}/teams/{{.TeamID}}/members/add" method="POST" class="card space-y-4">
        <input type="hidden" name="_csrf" value="{{.csrf}}">

        <!-- Выбор пользователя -->
        <div>
            <label for="user_id" class="block text-sm font-medium text-gray-700 mb-1">Выберите пользователя</label>
            <select name="user_id" id="user_id" required
                    class="w-full rounded-md shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.user_id}}border-red-500{{else}}border-gray-300{{end}}">
                <option value="">-- выберите пользователя --</option>
                {{range .Users}}
                    <option value="{{.ID}}">{{.Name}} ({{.Email}})</option>
                {{end}}
            </select>
            {{if .Errors.user_id}}<p class="text-red-500 text-xs mt-1">{{.Errors.user_id}}</p>{{end}}
        </div>

        <!-- Кнопки -->
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn btn-primary text-sm">Добавить</button>
            <a href="/games/{{.GameID}}/teams/{{.TeamID}}/members" class="btn btn-outline text-sm">Отмена</a>
        </div>
    </form>
</div>
{{end}}
