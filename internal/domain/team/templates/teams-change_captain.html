{{define "teams-change_captain.html"}}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6">Смена капитана команды «{{.Team.Name}}»</h1>

    <form action="/games/{{.GameID}}/teams/{{.TeamID}}/change-captain" method="POST" class="card space-y-4">
        <input type="hidden" name="_csrf" value="{{.csrf}}">

        <!-- Выбор нового капитана -->
        <div>
            <label for="captain_id" class="block text-sm font-medium text-gray-700 mb-1">Выберите нового капитана</label>
            <select name="captain_id" id="captain_id" required
                    class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
                <option value="">-- выберите нового капитана --</option>
                {{range .Members}}
                    <option value="{{.ID}}">{{.Name}} ({{.Email}})</option>
                {{end}}
            </select>
        </div>

        <!-- Кнопки -->
        <div class="flex flex-wrap gap-3 pt-2">
            <button type="submit" class="btn btn-primary text-sm">Сменить</button>
            <a href="/games/{{.GameID}}/teams/{{.TeamID}}/members" class="btn btn-outline text-sm">Отмена</a>
        </div>
    </form>
</div>
{{end}}
