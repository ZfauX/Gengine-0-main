{{define "home.html"}}
<div class="max-w-4xl mx-auto text-center py-12">
    <h1 class="text-4xl font-bold text-gray-800 mb-4">Добро пожаловать в Encounter Engine</h1>
    <p class="text-xl text-gray-600 mb-8">Платформа для создания и проведения городских, полевых и онлайн‑квестов</p>
    
    <!-- Search bar -->
    <div class="max-w-xl mx-auto mb-8">
        <form action="/games" method="GET" class="flex gap-2">
            <input type="text" name="search" placeholder="Поиск игр..." 
                   class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent">
            <button type="submit" class="btn btn-primary px-6">Найти</button>
        </form>
    </div>
    
    {{if .CurrentUserID}}
        <div class="flex flex-wrap justify-center gap-3">
            <a href="/dashboard" class="btn btn-primary text-sm">Личный кабинет</a>
            <a href="/games" class="btn btn-outline text-sm">Игры</a>
            <a href="/teams" class="btn btn-outline text-sm">Команды</a>
        </div>
    {{else}}
        <div class="flex flex-wrap justify-center gap-3">
            <a href="/auth/login" class="btn btn-primary text-sm">Войти</a>
            <a href="/auth/register" class="btn btn-outline text-sm">Зарегистрироваться</a>
        </div>
    {{end}}
</div>
{{end}}
