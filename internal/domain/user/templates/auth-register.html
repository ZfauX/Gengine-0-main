{{define "auth-register.html"}}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Регистрация</h1>

    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <div class="card">
        <form action="/auth/register" method="POST" class="space-y-4">
            <input type="hidden" name="_csrf" value="{{.csrf}}">

            <!-- Имя -->
            <div>
                <label for="name" class="block text-sm font-medium text-gray-700 mb-1">Имя</label>
                <input type="text" name="name" id="name" required
                       class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                       onkeypress="if(event.key === 'Enter') this.form.submit()">
            </div>

            <!-- Email -->
            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" id="email" required
                       class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
            </div>

            <!-- Пароль -->
            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                <input type="password" name="password" id="password" required minlength="6"
                       class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm">
            </div>

            <!-- reCAPTCHA (опционально) -->
            {{if .RecaptchaSiteKey}}
            <div class="flex justify-center">
                <div class="g-recaptcha" data-sitekey="{{.RecaptchaSiteKey}}"></div>
                <script src="https://www.google.com/recaptcha/api.js" async defer></script>
            </div>
            {{end}}

            <button type="submit" class="w-full btn btn-primary text-sm">Зарегистрироваться</button>
        </form>

        <div class="mt-4 text-center text-sm">
            <a href="/auth/login" class="text-blue-600 hover:underline">Уже есть аккаунт? Войти</a>
        </div>
    </div>
</div>
{{end}}
