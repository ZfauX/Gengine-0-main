<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Encounter Engine</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; color: #333; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .nav { background: #2c3e50; padding: 10px 20px; color: white; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; }
        .nav a { color: white; text-decoration: none; margin-left: 15px; }
        .button { display: inline-block; background: #3498db; color: white; padding: 10px 20px; border-radius: 4px; text-decoration: none; margin: 5px; }
        .button:hover { background: #2980b9; }
    </style>
    {{.ExtraHead}}
</head>
<body>
    <div class="nav">
        <span><a href="/">Encounter Engine</a></span>
        <span>
            {{if .CurrentUserID}}
                <a href="/dashboard">Личный кабинет</a>
                {{if .IsAdmin}}<a href="/admin">Админка</a>{{end}}
                <a href="/games">Игры</a>
                <a href="/teams">Команды</a>
                <a href="/profile">Профиль</a>
                <a href="/auth/logout">Выйти</a>
            {{else}}
                <a href="/auth/login">Войти</a>
                <a href="/auth/register">Регистрация</a>
            {{end}}
        </span>
    </div>
    <div class="container">
        {{if .ContentHTML}}
            {{.ContentHTML}}
        {{else}}
            <p>Контент не указан.</p>
        {{end}}
    </div>
    {{.ExtraScripts}}
</body>
</html>
