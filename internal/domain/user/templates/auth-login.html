{{define "auth-login.html"}}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Вход</h1>

    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <div class="card">
        <form action="/auth/login" method="POST" class="space-y-4">
            <input type="hidden" name="_csrf" value="{{.csrf}}">

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                <input type="email" name="email" id="email" required
                       class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.Email}}border-red-500{{end}}"
                       onkeypress="if(event.key === 'Enter') this.form.submit()">
                {{if .Errors.Email}}<p class="text-red-500 text-xs mt-1">{{.Errors.Email}}</p>{{end}}
            </div>

            <div>
                <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Пароль</label>
                <input type="password" name="password" id="password" required
                       class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm {{if .Errors.Password}}border-red-500{{end}}">
                {{if .Errors.Password}}<p class="text-red-500 text-xs mt-1">{{.Errors.Password}}</p>{{end}}
            </div>

            <button type="submit" id="loginBtn" class="w-full btn btn-primary text-sm">Войти</button>
        </form>

        <script nonce="{{.csp_nonce}}">
            document.querySelector('form').addEventListener('submit', function() {
                const btn = document.getElementById('loginBtn');
                btn.disabled = true;
                btn.textContent = 'Вход...';
                btn.classList.add('opacity-50', 'cursor-not-allowed');
            });
        </script>

        <div class="mt-4 space-y-2 text-center text-sm">
            <a href="/auth/register" class="block text-blue-600 hover:underline">Нет аккаунта? Зарегистрироваться</a>
            <a href="/auth/forgot" class="block text-blue-600 hover:underline">Забыли пароль?</a>
        </div>
    </div>

    <!-- OAuth-провайдеры -->
    <div class="card mt-6">
        <p class="text-sm text-gray-600 text-center mb-3">Или войдите через:</p>
        <div class="flex flex-wrap gap-2 justify-center">
            <a href="/auth/oauth/google" class="btn text-sm bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded-md">Google</a>
            <a href="/auth/oauth/github" class="btn text-sm bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-md">GitHub</a>
            <a href="/auth/oauth/yandex" class="btn text-sm bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-md">Яндекс</a>
        </div>
    </div>
</div>
{{end}}
