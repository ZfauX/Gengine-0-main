{{define "errors-429.html"}}
<div class="min-h-[60vh] flex items-center justify-center px-4">
    <div class="max-w-md w-full text-center">
        <div class="text-6xl mb-6">⏳</div>
        <h1 class="text-2xl font-bold text-gray-800 mb-4">429 — Слишком много запросов</h1>
        {{if .Error}}<p class="text-red-600 mb-2">{{.Error}}</p>{{end}}
        <p class="text-sm text-gray-400 mb-6">Пожалуйста, подождите немного перед повторной попыткой.</p>
        <div class="flex flex-wrap gap-3 justify-center">
            <a href="/" class="btn btn-primary text-sm inline-block">На главную</a>
            <button onclick="history.back()" class="btn btn-outline text-sm inline-block">← Назад</button>
        </div>
    </div>
</div>
{{end}}
