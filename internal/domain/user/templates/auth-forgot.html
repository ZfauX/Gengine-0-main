{{define "auth-forgot.html"}}
<div class="max-w-md mx-auto">
    <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center">Восстановление пароля</h1>

    {{if .Message}}
    <div class="flash flash-success">{{.Message}}</div>
    {{end}}
    {{if .Error}}
    <div class="flash flash-error">{{.Error}}</div>
    {{end}}

    <div class="card">
        <form action="/auth/forgot" method="POST" class="space-y-4">
            <input type="hidden" name="_csrf" value="{{.csrf}}">

            <div>
                <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Введите ваш email</label>
                <input type="email" name="email" id="email" required
                       class="w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm"
                       onkeypress="if(event.key === 'Enter') this.form.submit()">
            </div>

            <button type="submit" class="w-full btn btn-primary text-sm">Отправить инструкции</button>
        </form>
    </div>

    <div class="mt-4 text-center">
        <a href="/auth/login" class="text-sm text-blue-600 hover:underline">← Вернуться на страницу входа</a>
    </div>
</div>
{{end}}
