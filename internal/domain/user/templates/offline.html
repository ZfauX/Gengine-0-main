{{define "offline.html"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Нет соединения · Gengine</title>
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; background: #f3f4f6; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card { background: white; border-radius: 1rem; padding: 3rem; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.1); max-width: 400px; }
        h1 { font-size: 1.5rem; color: #111827; margin-bottom: 0.5rem; }
        p { color: #6b7280; margin-bottom: 1.5rem; }
        .btn { display: inline-block; padding: 0.75rem 1.5rem; background: #2563eb; color: white; border-radius: 0.5rem; text-decoration: none; font-weight: 500; }
        .btn:hover { background: #1d4ed8; }
        .icon { font-size: 4rem; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>Нет соединения</h1>
        <p>Проверьте подключение к интернету и попробуйте снова.</p>
        <button onclick="window.location.reload()" class="btn">🔄 Попробовать снова</button>
    </div>
</body>
</html>
{{end}}
